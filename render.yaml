services:
  # ─────────────────────────────────────────
  # 1. FastAPI Backend
  # ─────────────────────────────────────────
  - type: web
    name: voiceagent-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install uv && uv sync
    startCommand: uv run python main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GROQ_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_KEY
        sync: false

  # ─────────────────────────────────────────
  # 2. LiveKit Agent (Background Worker)
  # ─────────────────────────────────────────
  - type: worker
    name: voiceagent-livekit-agent
    runtime: python
    rootDir: backend
    buildCommand: pip install uv && uv sync
    startCommand: uv run python agent.py start
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GROQ_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_KEY
        sync: false

  # ─────────────────────────────────────────
  # 3. React Frontend (Static Site)
  # ─────────────────────────────────────────
  - type: web
    name: voiceagent-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_BACKEND_URL
        sync: false
      - key: VITE_LIVEKIT_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
